name: Sync to Gitee
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory /github/workspace

      - name: Setup SSH for Gitee (适配 root + runner 用户)
        env:
          SSH_PRIVATE_KEY: ${{ vars.GITEE_SSH_PRIVATE_KEY }}
        run: |
          # 1. 配置 runner 用户的 SSH（手动测试用）
          rm -rf ~/.ssh
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | sed -e 's/\r//g' -e '/^$/d' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ed25519 gitee.com > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # 2. 配置 root 用户的 SSH（git-mirror-action 用）
          rm -rf /root/.ssh
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          cp ~/.ssh/id_rsa /root/.ssh/id_rsa
          chmod 600 /root/.ssh/id_rsa
          cp ~/.ssh/known_hosts /root/.ssh/known_hosts
          chmod 644 /root/.ssh/known_hosts

          # 3. 全局配置 Git 使用指定 SSH 密钥
          git config --global core.sshCommand "ssh -i /root/.ssh/id_rsa -o IdentitiesOnly=yes"

          # 测试 root 用户的 SSH 连接
          echo "=== Root 用户 SSH 测试 ==="
          sudo ssh -v -i /root/.ssh/id_rsa git@gitee.com || true

      - name: Sync to Gitee
        uses: wearerequired/git-mirror-action@master
        env:
          SSH_PRIVATE_KEY: ${{ vars.GITEE_SSH_PRIVATE_KEY }}
        with:
          source-repo: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/xingfub/zeabur-memos-backup.git"
          destination-repo: "git@gitee.com:chxin/docker-memos.git"

      - name: Trigger Gitee Pipeline
        run: |
          curl -X POST \
            -H "Authorization: token ${{ vars.GITEE_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://gitee.com/api/v5/repos/chxin/docker-memos/pipelines" \
            -d '{"ref": "master"}'