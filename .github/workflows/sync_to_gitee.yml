name: Sync to Gitee
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取所有历史提交

      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory /github/workspace

      - name: Sync to Gitee (HTTPS 版，无 SSH)
        env:
          # Gitee 私人令牌（加密存储）
          GITEE_TOKEN: ${{ vars.GITEE_TOKEN }}
          # Gitee 用户名和仓库名
          GITEE_USER: chxin
          GITEE_REPO: docker-memos
          # GitHub 源仓库
          GITHUB_REPO: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/xingfub/zeabur-memos-backup.git
        run: |
          # 1. 克隆 GitHub 源仓库到本地（裸仓库）
          git clone --bare $GITHUB_REPO github-mirror.git
          
          # 2. 配置 Gitee HTTPS 地址（用户名:令牌@仓库地址）
          GITEE_REPO_URL="https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git"
          echo $GITEE_REPO_URL
          # 3. 推送所有分支和标签到 Gitee
          cd github-mirror.git
          git push --mirror $GITEE_REPO_URL
          
          # 清理临时文件
          cd ..
          rm -rf github-mirror.git

      - name: Trigger Gitee Pipeline
        env:
          GITEE_TOKEN: ${{ vars.GITEE_TOKEN }}  # 原有的 Gitee Token（用于触发 Pipeline）
        run: |
          curl -X POST \
            -H "Authorization: token $GITEE_TOKEN" \
            -H "Content-Type: application/json" \
            "https://gitee.com/api/v5/repos/chxin/docker-memos/pipelines" \
            -d '{"ref": "master"}'