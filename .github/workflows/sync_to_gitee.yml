name: Sync to Gitee
on:
  push:
    branches: [ main, master ]  # 监听的 GitHub 分支
  workflow_dispatch:  # 允许手动触发
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取所有历史提交
      - name: Sync to Gitee
        uses: wearerequired/git-mirror-action@master
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_TOKEN }}   
        with:
          source-repo: "https://github.com/xingfub/zeabur-memos-backup.git"
          destination-repo: "https://gitee.com/chxin/docker-memos.git"
      - name: Trigger Gitee Pipeline
        run: |
          # 调用 Gitee API 触发 Pipeline
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://gitee.com/api/v5/repos/chxin/docker-memos/pipelines" \
            -d '{"ref": "master"}'