name: Sync to Gitee
on:
  push:
    branches: [ main, master ]  # 监听的 GitHub 分支
  workflow_dispatch:  # 允许手动触发
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取所有历史提交

      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory /github/workspace

      # 新增步骤：配置 SSH 密钥（核心修复）
      - name: Setup SSH for Gitee
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
        run: |
          # 创建 SSH 目录并设置权限
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 将私钥写入文件并设置正确权限（关键：600）
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          echo "$SSH_PRIVATE_KEY"
          cat ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 配置 Gitee 为可信主机，避免首次连接的交互提示
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # 测试 SSH 连接（关键！添加这行，能在日志中看到具体错误）
          ssh -vT git@gitee.com
      - name: Sync to Gitee
        uses: wearerequired/git-mirror-action@master
        env:
          SSH_PRIVATE_KEY: ${{ vars.GITEE_SSH_PRIVATE_KEY }}
        with:
          source-repo: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/xingfub/zeabur-memos-backup.git"
          destination-repo: "git@gitee.com:chxin/docker-memos.git"

      - name: Trigger Gitee Pipeline
        run: |
          # 调用 Gitee API 触发 Pipeline
          curl -X POST \
            -H "Authorization: token ${{ vars.GITEE_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://gitee.com/api/v5/repos/chxin/docker-memos/pipelines" \
            -d '{"ref": "master"}'