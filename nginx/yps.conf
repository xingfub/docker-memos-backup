
server {
        listen 80;
        #请填写绑定证书的域名
        server_name yps.aotbot.com; 
        access_log /var/log/nginx/shouhus.log;
        error_log  /var/log/nginx/shouhuss.error.log ;

        location ~* \*(.js|.css)$ {
                expires 365d;
                add_header Cache-Control "public, max-age=31536000";
        }

        location / { 

                # proxy_pass http://172.17.0.5:5230;    
                # proxy_set_header Host $host;
                # proxy_set_header X-Real-IP $remote_addr;
                # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                root  /usr/share/nginx/memos/dist; # 指向React项目构建输出的目录
                index index.html;
                try_files $uri $uri/ /index.html; # 关键配置

              
        }  

        location ~ ^/memos. {
                proxy_pass http://172.17.0.5:5230;    
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
       
}

